name: Frontend Tests (MVP5)

on:
  push:
    branches: [ master, main, develop ]
    paths:
      - 'frontend/**'
      - 'frontend/tests/**'
      - '.github/workflows/frontend-tests.yml'
      - 'tests/run_tests.py'
  pull_request:
    branches: [ master, main, develop ]
    paths:
      - 'frontend/**'
      - 'frontend/tests/**'
      - '.github/workflows/frontend-tests.yml'
      - 'tests/run_tests.py'

jobs:
  frontend-mvp5-tests:
    name: Frontend MVP5 Tests (Block Renderer, Typewriter, Orchestration)
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ['3.10']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install 'pytest>=7,<9' 'jest>=29,<31'

      - name: Run MVP5 frontend unit tests
        run: |
          cd frontend
          python -m pytest tests/test_block_renderer.js tests/test_typewriter_engine.js tests/test_blocks_orchestrator.js tests/test_play_controls.js -v --tb=short || npm test

      - name: Run frontend suite with test runner
        run: |
          python tests/run_tests.py --mvp5 --verbose

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: frontend-test-reports-${{ matrix.python-version }}
          path: tests/reports/
          retention-days: 30
