version: 1
workflow:
  name: fy_governed_runtime_continuation
  phases:
    - name: audit_and_select_field
      outputs:
        - next_work_field
        - governing_contracts
        - target_repository_surfaces
    - name: contract_baseline
      suite: contractify
      outputs:
        - discovered_contracts
        - relation_map
        - drift_findings
    - name: structural_workstream
      suite: despaghettify
      outputs:
        - pre_state
        - workstream_slice
        - post_state
    - name: implementation
      actor: external_implementation_ai_or_human
      outputs:
        - changed_files
        - tests_or_evidence
    - name: documentation_followup
      suite: docify
      outputs:
        - doc_hints
        - boundary_updates
    - name: re_audit
      outputs:
        - delta_assessment
        - acceptance_state
        - next_cycle_decision
