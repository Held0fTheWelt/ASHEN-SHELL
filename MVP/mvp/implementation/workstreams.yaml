version: 2
workstreams:
  - id: A
    name: runtime_authority_and_session_truth
    owners: [backend, world_engine]
    target_paths:
      - backend/app/api/v1/session_routes.py
      - backend/app/services/game_service.py
      - backend/app/runtime/session_store.py
      - world-engine/app/runtime
    validation:
      - backend/tests/runtime
      - world-engine/tests
  - id: B
    name: runtime_safe_mcp_surface
    owners: [backend, tools_mcp_server, ai_stack]
    target_paths:
      - tools/mcp_server/backend_session_mcp_handler_factories.py
      - tools/mcp_server/tools_registry_handlers_backend_session.py
      - backend/app/api/v1/session_routes.py
      - backend/app/mcp_client
      - ai_stack/mcp_canonical_surface.py
    validation:
      - tools/mcp_server/tests/test_mcp_runtime_safe_session_surface.py
      - tools/mcp_server/tests/test_mcp_operational_parity_and_registry.py
      - backend/tests/runtime/test_mcp_enrichment.py
  - id: C
    name: player_route_purity_and_launch_flow
    owners: [frontend, backend]
    target_paths:
      - frontend
      - backend/app/web
      - backend/app/config.py
      - tests/e2e
      - tests/smoke
    validation:
      - tests/e2e
      - tests/smoke
  - id: D
    name: ai_stack_runtime_integration
    owners: [ai_stack, story_runtime_core, world_engine]
    target_paths:
      - ai_stack
      - story_runtime_core
      - world-engine/app/runtime
    validation:
      - ai_stack/tests
      - world-engine/tests
  - id: E
    name: governance_and_review_surfaces
    owners: [administration_tool, backend, writers_room]
    target_paths:
      - administration-tool
      - backend/app/api/v1/ai_stack_governance_routes.py
      - writers-room
    validation:
      - administration-tool/tests
      - backend/tests
      - writers-room/tests
  - id: F
    name: validation_and_release_honesty
    owners: [tests, documentation]
    target_paths:
      - tests
      - docs
      - mvp_v21/docs
    validation:
      - tests/smoke
      - component_suites
