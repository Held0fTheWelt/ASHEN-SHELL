version: 2
repository_targets:
  backend:
    responsibility:
      - api
      - auth
      - policy
      - content compiler integration
      - operator mirrors
      - persistence
    paths:
      - backend/app/api/v1
      - backend/app/services
      - backend/app/runtime
      - backend/app/content
      - backend/tests
  world_engine:
    responsibility:
      - authoritative runtime
      - committed turn truth
      - session execution
      - diagnostics
    paths:
      - world-engine/app/api
      - world-engine/app/runtime
      - world-engine/tests
  frontend:
    responsibility:
      - player/public ui
      - play launcher
      - play shell
    paths:
      - frontend/app
      - frontend/templates
      - frontend/static
      - frontend/tests
  administration_tool:
    responsibility:
      - operator/admin ui
      - management workflows
      - governance surfaces
    paths:
      - administration-tool/templates
      - administration-tool/static
      - administration-tool/tests
  writers_room:
    responsibility:
      - authoring ui
      - backend writers-room integration
    paths:
      - writers-room/app
      - writers-room/tests
  ai_stack:
    responsibility:
      - rag
      - langgraph orchestration
      - langchain bridges
      - governed ai helpers
    paths:
      - ai_stack
      - ai_stack/tests
  mcp:
    responsibility:
      - mcp registry
      - safe handlers
      - backend tool parity
    paths:
      - tools/mcp_server
      - tools/mcp_server/tests
  repo_tests:
    responsibility:
      - smoke
      - e2e
      - acceptance
    paths:
      - tests
