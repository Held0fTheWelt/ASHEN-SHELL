version: 1
role_boundary:
  audit_system_must_not_implement: true
  implementation_must_be_done_by_separate_ai: true
cycle:
  - audit
  - classify_maturity
  - choose_next_field
  - generate_handoff
  - receive_returned_work
  - re_audit
  - decide_continue_or_advance
selection_criteria:
  - runtime_criticality
  - architectural_centrality
  - unblock_value
  - implementation_readiness
  - evidence_deficit
  - dependency_structure
  - improvement_leverage
re_audit_checks:
  - scope_alignment
  - behavioral_completeness
  - evidence_quality
  - runtime_readiness_gain
  - drift_detection
output_requirements:
  - markdown_audit
  - next_work_field_decision
  - implementation_master_prompt
  - re_audit_checklist
