narrative_arc:
  name: "The Vera Investigation"
  structure: "three_act"
  act_1_setup:
    duration_turns: [1, 30]
    beats:
      - turn: 1
        type: "inciting_incident"
        content: "Player is hired to investigate Vera."
      - turn: 10
        type: "first_clue"
        content: "Evidence of financial irregularity."
  act_2_confrontation:
    duration_turns: [31, 70]
    beats:
      - turn: 40
        type: "revelation"
        content: "Marcus matters more than Vera admitted."
      - turn: 55
        type: "midpoint_twist"
        content: "The money trail is older than Vera's direct actions."
  act_3_resolution:
    duration_turns: [71, 100]
    branches:
      alliance_path:
        condition: "player_trust_vera > 0.6"
      betrayal_path:
        condition: "player_trust_vera < 0.3"
      complex_path:
        condition: "else"
