name: Dockerify suite

on:
  pull_request:
    paths:
      - "'fy'-suites/dockerify/**"
      - 'docker-up.py'
      - 'docker-compose.yml'
      - 'backend/Dockerfile'
      - 'backend/docker-entrypoint.sh'
      - 'world-engine/Dockerfile'
      - 'frontend/Dockerfile'
      - 'administration-tool/Dockerfile'
      - 'database/tests/**'
      - '.github/workflows/dockerify-skills-validate.yml'
      - 'pyproject.toml'
  push:
    branches: [main, master]
    paths:
      - "'fy'-suites/dockerify/**"
      - 'docker-up.py'
      - 'docker-compose.yml'
      - 'backend/Dockerfile'
      - 'backend/docker-entrypoint.sh'
      - 'world-engine/Dockerfile'
      - 'frontend/Dockerfile'
      - 'administration-tool/Dockerfile'
      - 'database/tests/**'
      - '.github/workflows/dockerify-skills-validate.yml'
      - 'pyproject.toml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
      - name: Install editable hub package
        run: |
          python -m pip install -U pip
          python -m pip install -e .
          python -m pip install pytest
      - name: Dockerify unit tests
        run: python -m pytest "'fy'-suites/dockerify/tools/tests" -q --tb=short
      - name: Dockerify audit smoke
        run: python -m dockerify.tools audit --quiet
