name: Documentify suite

on:
  pull_request:
    paths:
      - "'fy'-suites/documentify/**"
      - 'docs/**'
      - 'README.md'
      - 'tests/run_tests.py'
      - 'docker-up.py'
      - '.github/workflows/documentify-skills-validate.yml'
      - 'pyproject.toml'
  push:
    branches: [main, master]
    paths:
      - "'fy'-suites/documentify/**"
      - 'docs/**'
      - 'README.md'
      - 'tests/run_tests.py'
      - 'docker-up.py'
      - '.github/workflows/documentify-skills-validate.yml'
      - 'pyproject.toml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
      - name: Install editable hub package
        run: |
          python -m pip install -U pip
          python -m pip install -e .
          python -m pip install pytest
      - name: Documentify unit tests
        run: python -m pytest "'fy'-suites/documentify/tools/tests" -q --tb=short
      - name: Documentify generation smoke
        run: python -m documentify.tools generate --quiet
