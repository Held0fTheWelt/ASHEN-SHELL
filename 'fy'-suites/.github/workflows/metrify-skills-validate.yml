name: metrify skills validate

on:
  workflow_dispatch:
  push:
    paths:
      - 'metrify/**'
      - "'fy'-suites/metrify/**"
      - 'pyproject.toml'
      - '.github/workflows/metrify-skills-validate.yml'
  pull_request:
    paths:
      - 'metrify/**'
      - "'fy'-suites/metrify/**"
      - 'pyproject.toml'
      - '.github/workflows/metrify-skills-validate.yml'

jobs:
  metrify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e . pytest
      - name: Run metrify tests
        run: pytest metrify/adapter/tests metrify/tools/tests -q
