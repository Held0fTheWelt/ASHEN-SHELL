name: Testify suite

on:
  pull_request:
    paths:
      - "'fy'-suites/testify/**"
      - 'tests/run_tests.py'
      - '.github/workflows/**'
      - 'pyproject.toml'
  push:
    branches: [main, master]
    paths:
      - "'fy'-suites/testify/**"
      - 'tests/run_tests.py'
      - '.github/workflows/**'
      - 'pyproject.toml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: pip
      - name: Install editable hub package
        run: |
          python -m pip install -U pip
          python -m pip install -e .
          python -m pip install pytest
      - name: Testify unit tests
        run: python -m pytest "'fy'-suites/testify/tools/tests" -q --tb=short
      - name: Testify audit smoke
        run: python -m testify.tools audit --quiet
