name: Observifyfy suite

on:
  pull_request:
    paths:
      - "'fy'-suites/observifyfy/**"
      - "'fy'-suites/docs/**"
      - 'observifyfy/**'
      - '.fydata/bindings/observifyfy.json'
      - 'pyproject.toml'
  push:
    branches: [main, master]
    paths:
      - "'fy'-suites/observifyfy/**"
      - "'fy'-suites/docs/**"
      - 'observifyfy/**'
      - '.fydata/bindings/observifyfy.json'
      - 'pyproject.toml'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - name: Install editable hub package
        run: |
          python -m pip install -U pip
          python -m pip install -e .
          python -m pip install pytest
      - name: Observifyfy unit tests
        run: python -m pytest observifyfy/tools/tests -q --tb=short
      - name: Observifyfy audit smoke
        run: python -m observifyfy.tools audit --repo-root . --quiet
